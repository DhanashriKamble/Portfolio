
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.rawgit.com/davidshimjs/qrcodejs/gh-pages/qrcode.min.js"></script>

    <title>Profile</title>
    <style>
        body{
            text-align: center;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        #mg{
            border: 2px solid black;
            border-radius: 100%;
            height: 200px;
            width: 200px;
        }
        #code{
            align-items: center;
            margin-left: 47%;
        }
        button{
            border: 3px solid black;
            width: 120px;
            border-radius: 15%;
            background-color: black;
            color: aliceblue;
            margin: 15px;
        }
        a {
            color: inherit;
            text-decoration: none;
        }
        #con{
            width: 300px;
            align-items: center;
            margin-left: 42%;
            border: 2px solid gainsboro;
            height: 120px;
            text-align: left;

        }
        #closeButton{
            cursor: pointer; 
            position: fixed; 
            top: 10px; 
            left: 10px;
             font-size: 20px;
             margin: 10px;
             padding: 8px;
             border: 5px solid black;
             border-radius: 100%;
             background-color: #fab8b8;
             
        }
        
    </style>
</head>
<body>
    <div id="closeButton"><b>X</b></div>

    <div>
        <img id="mg" src="./images/profile.jpeg" alt="profile">
        <h1>Dhanashri Kamble</h1>
        <h2>Fresher</h2>
        <p>Web Developer.</p>
    </div>

    <div id="container">
        <div id="code"></div>
    </div>
    <div>
        <h6>Add your Digital Business Card to Wallet</h6>
        <span>
            <button>
                <a href="https://wallet.google/">
                    <img src="./images/google.png" height="25px" width="25px">Add To Goole Wallet
                </a>
            </button>
             <button>
                  <a href="https://www.apple.com/in/wallet/">
                    <img src="./images/download.png" height="25px" width="25px">Add To Apple Wallet
                </a>
             </button>
             
        </span>
        <div id="con">
            <span>
                  <p onclick="message()"><img src="./images/download (1).png" height="25px" width="25px">Add to Home Screen</p><hr>
                  <p><img src="./images/download (2).jpeg" height="25px" width="25px">Add to Gallery</p>
            </span>
        </div>
    </div>
    <script>
        var qrcode = new QRCode(document.getElementById("code"), {
            text: "http://127.0.0.1:5501/Portfolio/main.html",
            width: 128,
            height: 128
        });

        function message(){
           alert("Successfully Added!");  

        }

        function closePage() {
        window.close();
        window.location.href = 'main.html';

        }

        document.getElementById("closeButton").addEventListener("click", closePage);
    </script>
</body>
</html>
